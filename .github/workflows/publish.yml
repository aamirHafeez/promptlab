# Publishes to PyPI when you create a GitHub Release.
#
# ┌── ONE-TIME SETUP (do this only when you're ready to publish) ──────────────┐
# │ This workflow does NOTHING until you cut a GitHub Release, so it's safe to  │
# │ keep in the repo from day one. When you're ready:                          │
# │                                                                            │
# │ 1. Create an account at https://pypi.org                                   │
# │ 2. Register the project name (publish once manually, or pre-register).     │
# │ 3. Set up "Trusted Publishing" (recommended, no tokens to manage):         │
# │    PyPI → your project → Settings → Publishing → add a GitHub publisher    │
# │    with owner=aamirHafeez, repo=promptlab, workflow=publish.yml.          │
# │ 4. On GitHub: Releases → Draft a new release → tag like v0.1.0 → Publish.  │
# │                                                                            │
# │ Docs: https://docs.pypi.org/trusted-publishers/                            │
# └────────────────────────────────────────────────────────────────────────────┘

name: Publish

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
